name: Report Workflow

run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && format('manual report {0} {1} {2} {3}', inputs.report_slot, inputs.region, inputs.mode, inputs.analysis)
      || (github.event.schedule == '0 16 * * *'
          && 'scheduled report asia_day_preview east-compat fixture fallback'
          || 'scheduled report global_night_preview west-compat fixture fallback') }}

on:
  workflow_dispatch:
    inputs:
      report_slot:
        description: "Choose the report slot. Region remains a compatibility bridge until the CLI supports report_slot directly."
        required: true
        default: "asia_day_preview"
        type: choice
        options:
          - asia_day_preview
          - global_night_preview
      region:
        description: "Choose which compatibility region to run."
        required: true
        default: "both"
        type: choice
        options:
          - east
          - west
          - both
      mode:
        description: "Choose mock mode or local fixture mode."
        required: true
        default: "mock"
        type: choice
        options:
          - mock
          - fixture
      analysis:
        description: "Choose the report analysis path."
        required: true
        default: "fallback"
        type: choice
        options:
          - none
          - fallback
          - gpt
      send:
        description: "Send the generated report email when SendGrid secrets are available."
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      save:
        description: "Save generated prediction rows to SQLite."
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # 01:00 KST asia_day_preview. Region remains east as a temporary CLI bridge.
    - cron: "0 16 * * *"
    # 13:00 KST global_night_preview. Region remains west as a temporary CLI bridge.
    - cron: "0 4 * * *"

permissions:
  contents: read

jobs:
  east-report:
    name: East Report
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.region == 'east' || inputs.region == 'both')) ||
      (github.event_name == 'schedule' &&
      github.event.schedule == '0 16 * * *')
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
      REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      HEALTHCHECKS_EAST_URL: ${{ secrets.HEALTHCHECKS_EAST_URL }}
      REPORT_SLOT: ${{ github.event_name == 'workflow_dispatch' && inputs.report_slot || 'asia_day_preview' }}
      COMPAT_REGION: east
      REPORT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'fixture' }}
      ANALYSIS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.analysis || 'fallback' }}
      SEND_REPORT: ${{ github.event_name == 'workflow_dispatch' && inputs.send || 'true' }}
      SAVE_REPORT: ${{ github.event_name == 'workflow_dispatch' && inputs.save || 'true' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run pytest
        run: pytest

      - name: Ping Healthchecks start
        if: env.HEALTHCHECKS_EAST_URL != ''
        continue-on-error: true
        run: curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_EAST_URL}/start"

      - name: Set artifact timestamp
        id: east_artifact_ts
        run: |
          ARTIFACT_TS=$(date -u +%Y%m%dT%H%M%SZ)
          echo "ARTIFACT_TS=${ARTIFACT_TS}" >> "$GITHUB_ENV"
          echo "artifact_ts=${ARTIFACT_TS}" >> "$GITHUB_OUTPUT"

      - name: Generate east report
        run: |
          # report_slot is the new scheduling concept.
          # region remains a compatibility bridge until run_report.py supports report_slot directly.
          echo "Report slot: ${REPORT_SLOT}; compatibility region: ${COMPAT_REGION}"
          if [[ "${REPORT_MODE}" == "fixture" ]]; then
            command=(
              python run_report.py
              --region "${COMPAT_REGION}"
              --mode fixture
              --fixtures-file tests/fixtures/api_sports_fixtures_sample.json
              --odds-file tests/fixtures/odds_api_events_sample.json
              --analysis "${ANALYSIS_MODE}"
            )
          else
            command=(
              python run_report.py
              --region "${COMPAT_REGION}"
              --mode "${REPORT_MODE}"
              --analysis "${ANALYSIS_MODE}"
            )
          fi
          if [[ "${SEND_REPORT}" == "true" ]]; then
            command+=(--send)
          fi
          if [[ "${SAVE_REPORT}" == "true" ]]; then
            command+=(--save)
          fi
          echo "Running: ${command[*]}"
          "${command[@]}"

      - name: Upload east HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-east-${{ steps.east_artifact_ts.outputs.artifact_ts }}-run-${{ github.run_number }}
          path: out/*.html
          if-no-files-found: ignore

      - name: Upload east SQLite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-db-east-${{ steps.east_artifact_ts.outputs.artifact_ts }}-run-${{ github.run_number }}
          path: data/sports_agent.sqlite
          if-no-files-found: ignore

      - name: Ping Healthchecks success
        if: success() && env.HEALTHCHECKS_EAST_URL != ''
        continue-on-error: true
        run: curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_EAST_URL}"

      - name: Ping Healthchecks failure
        if: failure() && env.HEALTHCHECKS_EAST_URL != ''
        continue-on-error: true
        run: curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_EAST_URL}/fail"

  west-report:
    name: West Report
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (inputs.region == 'west' || inputs.region == 'both')) ||
      (github.event_name == 'schedule' &&
      github.event.schedule == '0 4 * * *')
    env:
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
      REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      HEALTHCHECKS_WEST_URL: ${{ secrets.HEALTHCHECKS_WEST_URL }}
      REPORT_SLOT: ${{ github.event_name == 'workflow_dispatch' && inputs.report_slot || 'global_night_preview' }}
      COMPAT_REGION: west
      REPORT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'fixture' }}
      ANALYSIS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.analysis || 'fallback' }}
      SEND_REPORT: ${{ github.event_name == 'workflow_dispatch' && inputs.send || 'true' }}
      SAVE_REPORT: ${{ github.event_name == 'workflow_dispatch' && inputs.save || 'true' }}
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Ruff
        run: ruff check .

      - name: Run pytest
        run: pytest

      - name: Ping Healthchecks start
        if: env.HEALTHCHECKS_WEST_URL != ''
        continue-on-error: true
        run: curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_WEST_URL}/start"

      - name: Set artifact timestamp
        id: west_artifact_ts
        run: |
          ARTIFACT_TS=$(date -u +%Y%m%dT%H%M%SZ)
          echo "ARTIFACT_TS=${ARTIFACT_TS}" >> "$GITHUB_ENV"
          echo "artifact_ts=${ARTIFACT_TS}" >> "$GITHUB_OUTPUT"

      - name: Generate west report
        run: |
          # report_slot is the new scheduling concept.
          # region remains a compatibility bridge until run_report.py supports report_slot directly.
          echo "Report slot: ${REPORT_SLOT}; compatibility region: ${COMPAT_REGION}"
          if [[ "${REPORT_MODE}" == "fixture" ]]; then
            command=(
              python run_report.py
              --region "${COMPAT_REGION}"
              --mode fixture
              --fixtures-file tests/fixtures/api_sports_fixtures_west_sample.json
              --odds-file tests/fixtures/odds_api_events_west_sample.json
              --analysis "${ANALYSIS_MODE}"
            )
          else
            command=(
              python run_report.py
              --region "${COMPAT_REGION}"
              --mode "${REPORT_MODE}"
              --analysis "${ANALYSIS_MODE}"
            )
          fi
          if [[ "${SEND_REPORT}" == "true" ]]; then
            command+=(--send)
          fi
          if [[ "${SAVE_REPORT}" == "true" ]]; then
            command+=(--save)
          fi
          echo "Running: ${command[*]}"
          "${command[@]}"

      - name: Upload west HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-west-${{ steps.west_artifact_ts.outputs.artifact_ts }}-run-${{ github.run_number }}
          path: out/*.html
          if-no-files-found: ignore

      - name: Upload west SQLite artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-db-west-${{ steps.west_artifact_ts.outputs.artifact_ts }}-run-${{ github.run_number }}
          path: data/sports_agent.sqlite
          if-no-files-found: ignore

      - name: Ping Healthchecks success
        if: success() && env.HEALTHCHECKS_WEST_URL != ''
        continue-on-error: true
        run: curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_WEST_URL}"

      - name: Ping Healthchecks failure
        if: failure() && env.HEALTHCHECKS_WEST_URL != ''
        continue-on-error: true
        run: curl -fsS -m 10 --retry 3 "${HEALTHCHECKS_WEST_URL}/fail"
